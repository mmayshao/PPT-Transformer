
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightDraft - AI Strategic Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <style>
        body {
            background-color: #FDFBF7;
            color: #334155;
            -webkit-font-smoothing: antialiased;
            /* 预定义的字体簇 */
            --font-yahei: "Microsoft YaHei", "微软雅黑", sans-serif;
            --font-pingfang: "PingFang SC", "Hiragino Sans GB", sans-serif;
        }
        
        .font-yahei { font-family: var(--font-yahei); }
        .font-pingfang { font-family: var(--font-pingfang); }
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'Roboto Mono', monospace; }

        .soft-shadow {
            box-shadow: 0 10px 40px -10px rgba(180, 150, 100, 0.1);
        }

        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .slide-card { 
                page-break-after: always !important;
                break-after: page !important;
                width: 297mm !important; /* A4 Landscape */
                height: 210mm !important;
                margin: 0 !important;
                padding: 15mm !important;
                border: none !important;
                box-shadow: none !important;
                display: block !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
