version: '3.8'

services:
  # Next.js PPT Transformer 应用
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ppt-transformer
    ports:
      - "3000:3000"
    environment:
      # Gemini API Key (必需)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Together.ai API Key (可选，用于图片生成)
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      # Next.js 配置
      - NODE_ENV=production
    restart: unless-stopped

# 使用说明:
# 1. 创建 .env 文件，填入以下环境变量:
#    GEMINI_API_KEY=your_gemini_api_key
#    TOGETHER_API_KEY=your_together_api_key (可选)
#
# 2. 启动服务:
#    docker-compose up -d
#
# 3. 访问应用:
#    http://localhost:3000
#
# 4. 查看日志:
#    docker-compose logs -f
#
# 5. 停止服务:
#    docker-compose down
